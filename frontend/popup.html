<!-- popup.html -->

<!DOCTYPE html>
<html>

<head>
  <title>Text Tone Changer</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
</head>

<body>
  <div class="popup-container">
    <h1>Text Tone Changer</h1>
    <textarea id="text-input" class="text-input" placeholder="Select text on a webpage"></textarea>
    <div class="tone-buttons">
      <button id="tone-formal" class="tone-button formal">Formal</button>
      <button id="tone-casual" class="tone-button casual">Casual</button>
      <button id="tone-friendly" class="tone-button friendly">Friendly</button>
    </div>
    <button id="reset-button">Reset</button>
    <button id="save-button">Save to Clipboard</button>
  </div>
</body>

</html>
